<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stock Counter Demo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1c2537;
    --surface3: #243044;
    --accent: #00d4ff;
    --accent2: #0066ff;
    --green: #00ff88;
    --red: #ff4466;
    --yellow: #ffcc00;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: rgba(255,255,255,0.06);
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,102,255,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 90%, rgba(0,212,255,0.06) 0%, transparent 60%);
  }

  /* HEADER */
  .header {
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(17,24,39,0.8); backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
  }
  .header-title { font-size: 1rem; font-weight: 700; letter-spacing: 0.02em; }
  .header-sub { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); }
  .badge-demo {
    padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600;
    background: rgba(255,204,0,0.15); color: var(--yellow);
    border: 1px solid rgba(255,204,0,0.3); font-family: var(--mono); letter-spacing: 0.05em;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 12px 8px; border: none; background: transparent;
    color: var(--muted); font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    border-bottom: 2px solid transparent; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== SCAN PAGE ===== */
  .scan-wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  /* Camera */
  .cam-box {
    position: relative; border-radius: 20px; overflow: hidden;
    background: #000; aspect-ratio: 4/3;
    border: 1.5px solid var(--border);
    box-shadow: 0 0 40px rgba(0,102,255,0.15);
  }

  #scanner-container {
    width: 100%; height: 100%;
  }

  /* Override html5-qrcode default styles */
  #scanner-container > div {
    border: none !important;
    padding: 0 !important;
  }

  #scanner-container video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    border-radius: 0 !important;
  }

  /* Hide html5-qrcode built-in UI elements we don't need */
  #scanner-container img,
  #scanner-container canvas.qr-canvas {
    display: none !important;
  }

  .cam-overlay {
    position: absolute; inset: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }

  .scan-frame {
    width: 70%; aspect-ratio: 3/1;
    border: 2px solid var(--accent);
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    position: relative;
  }

  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0; animation: scanMove 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent);
  }

  @keyframes scanMove {
    0%   { top: 0%; }
    50%  { top: 100%; }
    100% { top: 0%; }
  }

  .scan-corner {
    position: absolute; width: 16px; height: 16px;
    border-color: var(--accent); border-style: solid;
  }
  .scan-corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .scan-corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .scan-corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .scan-corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .cam-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    color: var(--muted); font-size: 0.85rem;
  }
  .cam-placeholder .big { font-size: 3rem; }

  .scan-flash {
    position: absolute; inset: 0; background: rgba(0,255,136,0.2);
    border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.1s;
  }
  .scan-flash.show { opacity: 1; animation: flashOut 0.4s ease forwards; }
  @keyframes flashOut { 0%{opacity:1} 100%{opacity:0} }

  /* Scan controls */
  .scan-controls { display: flex; gap: 10px; }

  .btn-scan {
    flex: 1; padding: 14px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff; font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(0,102,255,0.35);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-scan:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,102,255,0.45); }
  .btn-scan:active { transform: scale(0.97); }
  .btn-scan.stop { background: linear-gradient(135deg, #ff4466, #cc2244); box-shadow: 0 4px 20px rgba(255,68,102,0.35); }
  .btn-scan:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-manual {
    padding: 14px 16px; border-radius: 14px;
    border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--muted); font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-manual:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* Last scan card */
  .last-scan {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 16px; display: none;
  }
  .last-scan.show { display: block; animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .last-scan-label { font-size: 0.72rem; color: var(--muted); font-family: var(--mono); margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .last-scan-body { display: flex; align-items: center; gap: 12px; }
  .last-scan-icon {
    width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.3rem;
  }
  .icon-ok   { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.25); }
  .icon-over { background: rgba(255,204,0,0.12);  border: 1px solid rgba(255,204,0,0.25); }
  .icon-err  { background: rgba(255,68,102,0.12); border: 1px solid rgba(255,68,102,0.25); }
  .icon-new  { background: rgba(0,212,255,0.12);  border: 1px solid rgba(0,212,255,0.25); }
  .last-scan-info { flex: 1; min-width: 0; }
  .last-scan-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .last-scan-code { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .last-scan-count { text-align: right; flex-shrink: 0; }
  .count-num { font-family: var(--mono); font-size: 1.4rem; font-weight: 700; line-height: 1; }
  .count-of  { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .count-ok   { color: var(--green); }
  .count-over { color: var(--yellow); }
  .count-err  { color: var(--red); }
  .count-new  { color: var(--accent); }

  /* Manual input overlay */
  .manual-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .manual-overlay.show { opacity: 1; pointer-events: all; }
  .manual-sheet {
    width: 100%; max-width: 520px;
    background: var(--surface); border-radius: 24px 24px 0 0;
    padding: 24px 20px 36px;
    border-top: 1px solid var(--border);
    transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
  }
  .manual-overlay.show .manual-sheet { transform: translateY(0); }
  .manual-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--surface3); margin: 0 auto 20px;
  }
  .manual-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
  .manual-input-wrap { position: relative; margin-bottom: 14px; }
  .manual-input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: var(--mono);
    font-size: 1.1rem; font-weight: 600;
    padding: 14px 16px; outline: none; transition: border-color 0.2s;
  }
  .manual-input:focus { border-color: var(--accent); }
  .manual-input::placeholder { color: var(--muted); font-weight: 400; font-family: 'IBM Plex Sans Thai', sans-serif; }
  .btn-confirm {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff; font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-confirm:hover { opacity: 0.9; }

  /* ===== SUMMARY PAGE ===== */
  .summary-wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 12px; text-align: center;
  }
  .stat-num { font-family: var(--mono); font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 5px; }
  .stat-ok   { color: var(--green); }
  .stat-diff { color: var(--red); }
  .stat-pending { color: var(--yellow); }
  .section-label {
    font-size: 0.72rem; color: var(--muted); font-family: var(--mono);
    letter-spacing: 0.08em; text-transform: uppercase; padding: 0 2px;
  }
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px;
    display: flex; align-items: center; gap: 12px; transition: border-color 0.2s;
  }
  .item-card:hover { border-color: rgba(255,255,255,0.14); }
  .item-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .s-ok      { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .s-over    { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .s-short   { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .s-pending { background: var(--muted); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 0.88rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-code { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-count { font-family: var(--mono); font-size: 0.9rem; font-weight: 700; }
  .item-expected { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 0.65rem; font-family: var(--mono); font-weight: 600; margin-top: 4px;
  }
  .tag-ok     { background: rgba(0,255,136,0.12); color: var(--green); }
  .tag-over   { background: rgba(255,204,0,0.12);  color: var(--yellow); }
  .tag-short  { background: rgba(255,68,102,0.12); color: var(--red); }
  .tag-pending{ background: rgba(100,116,139,0.15); color: var(--muted); }
  .btn-reset {
    width: 100%; padding: 12px; border-radius: 12px;
    border: 1.5px solid rgba(255,68,102,0.3);
    background: rgba(255,68,102,0.08); color: var(--red);
    font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 0.88rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px;
  }
  .btn-reset:hover { background: rgba(255,68,102,0.16); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px;
    font-size: 0.88rem; font-weight: 600;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: transform 0.3s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
    opacity: 0; z-index: 300; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Progress bar */
  .progress-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; }
  .progress-top { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.82rem; }
  .progress-bar-bg { height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.5s cubic-bezier(0.22,1,0.36,1); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">📦</div>
    <div>
      <div class="header-title">Stock Counter</div>
      <div class="header-sub">v1.1 · DEMO</div>
    </div>
  </div>
  <div class="badge-demo">⚡ DEMO</div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('scan')" id="tab-scan">
    <span>📷</span> สแกน
  </button>
  <button class="tab-btn" onclick="showTab('summary')" id="tab-summary">
    <span>📊</span> สรุป <span id="tab-badge" style="display:none;background:rgba(0,212,255,0.2);color:var(--accent);border-radius:10px;padding:1px 7px;font-size:0.7rem;"></span>
  </button>
</div>

<!-- SCAN PAGE -->
<div class="page active" id="page-scan">
  <div class="scan-wrap">

    <div class="cam-box" id="cam-box">
      <div id="scanner-container"></div>
      <div class="cam-overlay" id="cam-overlay" style="display:none">
        <div class="scan-frame">
          <div class="scan-line"></div>
          <div class="scan-corner tl"></div>
          <div class="scan-corner tr"></div>
          <div class="scan-corner bl"></div>
          <div class="scan-corner br"></div>
        </div>
      </div>
      <div class="cam-placeholder" id="cam-placeholder">
        <div class="big">📷</div>
        <div>กดปุ่ม "เริ่มสแกน" เพื่อเปิดกล้อง</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:4px">รองรับ Barcode ทุกประเภท</div>
      </div>
      <div class="scan-flash" id="scan-flash"></div>
    </div>

    <div class="scan-controls">
      <button class="btn-scan" id="btn-scan" onclick="toggleScan()">
        <span>📷</span> เริ่มสแกน
      </button>
      <button class="btn-manual" onclick="openManual()">⌨️ พิมพ์</button>
    </div>

    <div class="last-scan" id="last-scan">
      <div class="last-scan-label">🔍 สแกนล่าสุด</div>
      <div class="last-scan-body" id="last-scan-body"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-top">
        <span style="color:var(--muted);font-size:0.8rem">ความคืบหน้าการนับ</span>
        <span style="font-family:var(--mono);font-size:0.8rem" id="prog-text">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
      </div>
    </div>

  </div>
</div>

<!-- SUMMARY PAGE -->
<div class="page" id="page-summary">
  <div class="summary-wrap">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num stat-ok" id="stat-ok">0</div>
        <div class="stat-label">✅ ตรง</div>
      </div>
      <div class="stat-card">
        <div class="stat-num stat-diff" id="stat-diff">0</div>
        <div class="stat-label">⚠️ ผิดปกติ</div>
      </div>
      <div class="stat-card">
        <div class="stat-num stat-pending" id="stat-pending">0</div>
        <div class="stat-label">⏳ ยังไม่นับ</div>
      </div>
    </div>
    <div class="section-label">รายการสินค้าทั้งหมด</div>
    <div class="item-list" id="item-list"></div>
    <button class="btn-reset" onclick="resetAll()">🔄 รีเซ็ตการนับทั้งหมด</button>
  </div>
</div>

<!-- MANUAL OVERLAY -->
<div class="manual-overlay" id="manual-overlay" onclick="closeManualOutside(event)">
  <div class="manual-sheet">
    <div class="manual-handle"></div>
    <div class="manual-title">⌨️ พิมพ์ Matcode</div>
    <div class="manual-input-wrap">
      <input type="text" class="manual-input" id="manual-input"
             placeholder="เช่น MAT001" autocomplete="off" autocapitalize="characters"
             onkeydown="if(event.key==='Enter') confirmManual()">
    </div>
    <button class="btn-confirm" onclick="confirmManual()">ยืนยัน</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// =================== DEMO DATA ===================
const STOCK_DATA = [
  { matcode: 'MAT001', name: 'น็อตหกเหลี่ยม M8',     expected: 50  },
  { matcode: 'MAT002', name: 'สกรูหัวจม M6x20',        expected: 100 },
  { matcode: 'MAT003', name: 'แหวนรอง สแตนเลส',        expected: 200 },
  { matcode: 'MAT004', name: 'ท่อ PVC 1/2 นิ้ว',       expected: 30  },
  { matcode: 'MAT005', name: 'สายไฟ THW 2.5mm',         expected: 15  },
  { matcode: 'MAT006', name: 'หลอด LED 9W',             expected: 24  },
  { matcode: 'MAT007', name: 'สวิตช์ 2 ทาง',            expected: 10  },
  { matcode: 'MAT008', name: 'ปลั๊กตัวเมีย 3 ขา',       expected: 20  },
];

// State
let counts = {};
let scanning = false;
let lastCode = '';
let lastCodeTime = 0;
let html5QrCode = null;

STOCK_DATA.forEach(item => counts[item.matcode] = 0);

// =================== TABS ===================
function showTab(t) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + t).classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'summary') renderSummary();
}

// =================== SCANNER (Html5-QrCode) ===================
function toggleScan() {
  if (scanning) stopScan();
  else startScan();
}

function startScan() {
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> กำลังเปิดกล้อง...';

  // สร้าง instance ใหม่ทุกครั้ง
  html5QrCode = new Html5Qrcode("scanner-container", { verbose: false });

  const config = {
    fps: 10,
    qrbox: false, // ปิด built-in qrbox ใช้ overlay ของเราแทน
    aspectRatio: 4/3,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.QR_CODE,
    ]
  };

  html5QrCode.start(
    { facingMode: "environment" },
    config,
    (decodedText) => {
      const now = Date.now();
      if (decodedText === lastCode && now - lastCodeTime < 2000) return;
      lastCode = decodedText;
      lastCodeTime = now;
      handleCode(decodedText);
    },
    () => { /* scanning in progress — no action needed */ }
  ).then(() => {
    scanning = true;
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('cam-overlay').style.display = 'flex';
    btn.disabled = false;
    btn.innerHTML = '<span>⏹</span> หยุดสแกน';
    btn.classList.add('stop');
  }).catch(err => {
    console.error('Camera error:', err);
    let msg = '❌ ไม่สามารถเปิดกล้องได้';
    if (err && err.toString().includes('permission')) {
      msg = '❌ กรุณาอนุญาตการเข้าถึงกล้องก่อน';
    } else if (err && err.toString().includes('https')) {
      msg = '❌ ต้องใช้งานผ่าน HTTPS เท่านั้น';
    }
    showToast(msg);
    html5QrCode = null;
    btn.disabled = false;
    btn.innerHTML = '<span>📷</span> เริ่มสแกน';
    btn.classList.remove('stop');
  });
}

function stopScan() {
  if (!html5QrCode) return;

  html5QrCode.stop().then(() => {
    html5QrCode.clear();
    html5QrCode = null;
  }).catch(() => {
    html5QrCode = null;
  });

  scanning = false;
  document.getElementById('cam-overlay').style.display = 'none';
  document.getElementById('cam-placeholder').style.display = 'flex';

  // ล้าง video element ที่ html5-qrcode สร้างไว้
  const container = document.getElementById('scanner-container');
  container.innerHTML = '';

  const btn = document.getElementById('btn-scan');
  btn.innerHTML = '<span>📷</span> เริ่มสแกน';
  btn.classList.remove('stop');
}

// =================== HANDLE CODE ===================
function handleCode(code) {
  const flash = document.getElementById('scan-flash');
  flash.classList.remove('show');
  void flash.offsetWidth;
  flash.classList.add('show');

  const item = STOCK_DATA.find(i => i.matcode === code);

  if (!item) {
    showLastScan({ code, found: false });
    showToast('⚠️ ไม่พบ Matcode นี้ในระบบ');
    return;
  }

  counts[code] = (counts[code] || 0) + 1;
  showLastScan({ code, item, count: counts[code], found: true });
  updateProgress();
  updateBadge();

  const diff = counts[code] - item.expected;
  if (counts[code] === item.expected) showToast(`✅ ${item.name} — ครบแล้ว!`);
  else if (diff > 0) showToast(`⚠️ ${item.name} — เกิน ${diff} ชิ้น`);
  else showToast(`📦 ${item.name} — นับแล้ว ${counts[code]}/${item.expected}`);
}

function showLastScan({ code, item, count, found }) {
  const el = document.getElementById('last-scan');
  const body = document.getElementById('last-scan-body');
  el.classList.add('show');

  if (!found) {
    body.innerHTML = `
      <div class="last-scan-icon icon-err">❓</div>
      <div class="last-scan-info">
        <div class="last-scan-name" style="color:var(--red)">ไม่พบในระบบ</div>
        <div class="last-scan-code">${code}</div>
      </div>`;
    return;
  }

  const diff = count - item.expected;
  let iconClass, countClass, tag;
  if (count === item.expected) {
    iconClass = 'icon-ok'; countClass = 'count-ok'; tag = `<span class="tag tag-ok">✅ ครบ</span>`;
  } else if (diff > 0) {
    iconClass = 'icon-over'; countClass = 'count-over'; tag = `<span class="tag tag-over">⚠️ เกิน ${diff}</span>`;
  } else {
    iconClass = 'icon-new'; countClass = 'count-new'; tag = `<span class="tag tag-pending">📦 ขาด ${Math.abs(diff)}</span>`;
  }

  body.innerHTML = `
    <div class="last-scan-icon ${iconClass}">📦</div>
    <div class="last-scan-info">
      <div class="last-scan-name">${item.name}</div>
      <div class="last-scan-code">${code}</div>
      ${tag}
    </div>
    <div class="last-scan-count">
      <div class="count-num ${countClass}">${count}</div>
      <div class="count-of">จาก ${item.expected}</div>
    </div>`;
}

// =================== MANUAL INPUT ===================
function openManual() {
  document.getElementById('manual-overlay').classList.add('show');
  setTimeout(() => document.getElementById('manual-input').focus(), 300);
}

function closeManual() {
  document.getElementById('manual-overlay').classList.remove('show');
  document.getElementById('manual-input').value = '';
}

function closeManualOutside(e) {
  if (e.target === document.getElementById('manual-overlay')) closeManual();
}

function confirmManual() {
  const val = document.getElementById('manual-input').value.trim().toUpperCase();
  if (!val) return;
  closeManual();
  handleCode(val);
}

// =================== SUMMARY ===================
function renderSummary() {
  let ok = 0, diff = 0, pending = 0;
  STOCK_DATA.forEach(item => {
    const c = counts[item.matcode] || 0;
    if (c === 0) pending++;
    else if (c === item.expected) ok++;
    else diff++;
  });
  document.getElementById('stat-ok').textContent = ok;
  document.getElementById('stat-diff').textContent = diff;
  document.getElementById('stat-pending').textContent = pending;

  const list = document.getElementById('item-list');
  list.innerHTML = STOCK_DATA.map(item => {
    const c = counts[item.matcode] || 0;
    let statusClass, tagHtml, countColor;
    if (c === 0) {
      statusClass = 's-pending'; tagHtml = `<span class="tag tag-pending">⏳ ยังไม่นับ</span>`; countColor = 'color:var(--muted)';
    } else if (c === item.expected) {
      statusClass = 's-ok'; tagHtml = `<span class="tag tag-ok">✅ ครบ</span>`; countColor = 'color:var(--green)';
    } else if (c > item.expected) {
      statusClass = 's-over'; tagHtml = `<span class="tag tag-over">⚠️ เกิน ${c - item.expected}</span>`; countColor = 'color:var(--yellow)';
    } else {
      statusClass = 's-short'; tagHtml = `<span class="tag tag-short">❌ ขาด ${item.expected - c}</span>`; countColor = 'color:var(--red)';
    }

    return `
    <div class="item-card">
      <div class="item-status ${statusClass}"></div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-code">${item.matcode}</div>
        ${tagHtml}
      </div>
      <div class="item-right">
        <div class="item-count" style="${countColor}">${c}</div>
        <div class="item-expected">เป้า: ${item.expected}</div>
      </div>
    </div>`;
  }).join('');
}

function updateProgress() {
  const counted = STOCK_DATA.filter(i => (counts[i.matcode] || 0) > 0).length;
  const total = STOCK_DATA.length;
  const pct = total ? Math.round(counted / total * 100) : 0;
  document.getElementById('prog-text').textContent = `${counted} / ${total}`;
  document.getElementById('prog-bar').style.width = pct + '%';
}

function updateBadge() {
  const counted = STOCK_DATA.filter(i => (counts[i.matcode] || 0) > 0).length;
  const badge = document.getElementById('tab-badge');
  if (counted > 0) { badge.style.display = ''; badge.textContent = counted; }
  else badge.style.display = 'none';
}

function resetAll() {
  if (!confirm('รีเซ็ตการนับทั้งหมดใช่ไหม?')) return;
  STOCK_DATA.forEach(item => counts[item.matcode] = 0);
  document.getElementById('last-scan').classList.remove('show');
  updateProgress();
  updateBadge();
  renderSummary();
  showToast('🔄 รีเซ็ตเรียบร้อยแล้ว');
}

// =================== TOAST ===================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Init
updateProgress();
updateBadge();
</script>
</body>
</html>
